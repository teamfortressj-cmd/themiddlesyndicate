<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vengeance List - Book of Vengeance</title>
    <style>
        body { 
            font-family: 'Times New Roman', serif; 
            margin: 20px;
            background-color: #1a0033;
            background-image: url('https://i.ibb.co/VYD3QHX3/7b529c81-ae88-4474-863b-db0dd32b0418-removalai-preview-1.png');
            background-repeat: repeat;
            background-size: 200px 200px;
            color: white;
            position: relative;
        }
        
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: rgba(25, 0, 51, 0.9);
            padding: 20px; 
            border: 3px solid #FFD700;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(128, 0, 128, 0.5);
        }
        
        header {
            text-align: center;
            padding: 20px 0;
        }
        
        .logo {
            width: 150px;
            height: auto;
            margin: 0 auto 20px;
            filter: drop-shadow(0 0 5px gold);
        }
        
        h1 { 
            color: #FFD700; 
            font-size: 2.5em;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        
        h2 { 
            color: #FFD700; 
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
            text-align: center;
        }
        
        h3 { 
            color: #e0b0ff; 
            margin-top: 25px;
            border-left: 3px solid #800080;
            padding-left: 10px;
        }
        
        nav { 
            margin: 20px 0; 
            text-align: center;
            background: rgba(128, 0, 128, 0.3);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #800080;
        }
        
        nav a { 
            margin: 0 15px; 
            text-decoration: none; 
            color: #FFD700; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 15px;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        
        nav a:hover { 
            background: rgba(255, 215, 0, 0.2);
            text-decoration: underline; 
        }
        
        .entry { 
            border: 1px solid #800080; 
            margin: 20px 0; 
            padding: 20px; 
            border-radius: 8px; 
            background: rgba(51, 0, 102, 0.5);
            box-shadow: 0 0 10px rgba(128, 0, 128, 0.3);
        }
        
        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #800080;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        
        .name { 
            font-weight: bold; 
            font-size: 1.2em; 
            color: #FFD700;
        }
        
        .crime { 
            color: #e0b0ff; 
            margin: 5px 0; 
        }
        
        .submitted-by { 
            font-size: 0.9em; 
            color: #b19cd9; 
        }
        
        .punishment-section {
            background: rgba(139, 0, 0, 0.2);
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            border-left: 3px solid #cc0000;
        }
        
        .punishment-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }
        
        .status-completed {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }
        
        .executor { 
            color: #FFD700; 
            font-weight: bold; 
        }
        
        .leaderboard {
            background: rgba(218, 165, 32, 0.1);
            padding: 20px;
            border-radius: 5px;
            margin: 25px 0;
            border: 1px solid #DAA520;
        }
        
        .leaderboard h3 { 
            margin-top: 0; 
            color: #FFD700;
        }
        
        .search-box { 
            margin: 20px 0; 
            padding: 12px; 
            width: 100%; 
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #800080;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }
        
        ::placeholder {
            color: #b19cd9;
        }
        
        .empty-list {
            text-align: center;
            padding: 40px;
            color: #b19cd9;
            font-style: italic;
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            color: #b19cd9;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://i.ibb.co/gZdBCFNK/The-Middle-Logo.png" alt="Middle Logo" class="logo">
            <h1>📖 Book of Vengeance</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="rules.html">Rules & Punishments</a>
                <a href="vengeance-list.html">Vengeance List</a>
                <a href="submit.html">Submit</a>
            </nav>
        </header>
        
        <main>
            <h2>Vengeance List</h2>
            
            <input type="text" id="searchBox" class="search-box" placeholder="Search names or crimes...">
            
            <div class="leaderboard">
                <h3>🏆 Current Leaders</h3>
                <p><strong>Most Crimes Against Middle:</strong> -</p>
                <p><strong>Most Active Submitters:</strong> -</p>
            </div>
            
            <div class="empty-list">
                <h3>No entries yet</h3>
                <p>The Book of Vengeance awaits its first transgressions...</p>
            </div>
        </main>
        
        <footer>
            <p>The Book of Vengeance • Maintained by the Middle</p>
        </footer>
    </div>
</body>
</html>
